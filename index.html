<style>

<body>
<div id="app">

<!-- ==================== MODAL AUTENTICACIÓN ==================== -->
<div class="modal-overlay" id="modal-auth">
  <div class="modal auth-modal">
    <div class="modal-head">
      <h2 id="auth-title">Iniciar Sesión</h2>
    </div>
    <div id="auth-form">
      <div class="fg">
        <label>Correo electrónico</label>
        <input type="email" id="auth-email" placeholder="tu@email.com">
      </div>
      <div class="fg">
        <label>Contraseña</label>
        <input type="password" id="auth-password" placeholder="••••••••">
      </div>
      <div class="fg" id="register-fields" style="display:none;">
        <label>Nombre completo</label>
        <input type="text" id="auth-name" placeholder="Juan Pérez">
        <label>Número de WhatsApp</label>
        <input type="tel" id="auth-phone" placeholder="+34 612 345 678">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="toggleAuthMode()">Registrarse</button>
        <button class="btn-ok" id="btn-auth" onclick="handleAuth()">Iniciar Sesión</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Crear Tienda (protegido) -->
<!-- ... tu modal original ... -->

<script>
// ==================== AUTENTICACIÓN ====================
let currentUser = null;

function checkAuth() {
  const savedUser = localStorage.getItem('currentUser');
  if (savedUser) {
    currentUser = JSON.parse(savedUser);
    document.getElementById('modal-auth').classList.add('hidden');
  } else {
    document.getElementById('modal-auth').classList.remove('hidden');
  }
}

let isLogin = true;
function toggleAuthMode() {
  isLogin = !isLogin;
  document.getElementById('auth-title').textContent = isLogin ? 'Iniciar Sesión' : 'Crear Cuenta';
  document.getElementById('register-fields').style.display = isLogin ? 'none' : 'block';
  document.getElementById('btn-auth').textContent = isLogin ? 'Iniciar Sesión' : 'Registrarse';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value.trim();

  if (!email || !password) {
    showToast('⚠', 'Correo y contraseña son obligatorios');
    return;
  }

  if (!isLogin) {
    const name = document.getElementById('auth-name').value.trim();
    const phone = document.getElementById('auth-phone').value.trim();
    if (!name || !phone) {
      showToast('⚠', 'Nombre y teléfono son obligatorios');
      return;
    }
    currentUser = { id: Date.now(), name, email, phone };
  } else {
    // Simulación de login
    currentUser = { id: 1, name: "Usuario Demo", email, phone: "+34 600 000 000" };
  }

  localStorage.setItem('currentUser', JSON.stringify(currentUser));
  document.getElementById('modal-auth').classList.add('hidden');
  showToast('✅', `Bienvenido, ${currentUser.name}`);
}

// ==================== PROTECCIÓN DE ACCIONES ====================
function openCreateStore() {
  if (!currentUser) {
    showToast('🔒', 'Debes iniciar sesión para crear una tienda');
    document.getElementById('modal-auth').classList.remove('hidden');
    return;
  }
  // ... resto de tu código original de openCreateStore
}

function togglePublish() {
  if (!currentUser) {
    showToast('🔒', 'Debes iniciar sesión para publicar productos');
    document.getElementById('modal-auth').classList.remove('hidden');
    return;
  }
  // ... resto original
}

// ==================== SUBIDA DE IMAGEN + URL ====================
let selectedFile = null;

function createProductHTML() {
  // Reemplaza tu publish bar con esta versión mejorada
  return `
  <div class="pub-fields">
    <!-- ... campos anteriores ... -->
    <div class="pf" style="flex:1;min-width:180px">
      <label>Imagen del producto</label>
      <input type="text" id="pf-img" placeholder="https://... (opcional)">
      
      <div class="image-upload-area" onclick="document.getElementById('file-input').click()">
        <p>📸 Haz clic para subir imagen desde tu dispositivo</p>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
      </div>
      <div id="image-preview" class="preview-img hidden"></div>
    </div>
    <button class="btn-pub" onclick="publishProduct()">Publicar →</button>
  </div>`;
}

// Manejar imagen seleccionada
function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const preview = document.getElementById('image-preview');
    preview.innerHTML = `<img src="${ev.target.result}" style="max-height:180px;border-radius:8px">`;
    preview.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

// ==================== PUBLICAR PRODUCTO (con teléfono) ====================
async function publishProduct() {
  if (!currentUser) {
    showToast('🔒', 'Debes iniciar sesión');
    return;
  }
  if (!activeStore) return;

  const name = document.getElementById('pf-name').value.trim();
  if (!name) return showToast('⚠', 'Nombre obligatorio');

  let imageUrl = document.getElementById('pf-img').value.trim();

  // Si hay archivo subido, usar data URL
  if (selectedFile) {
    imageUrl = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(selectedFile);
    });
  }

  try {
    const product = await api.createProduct({
      store_id: activeStore.id,
      name,
      price: document.getElementById('pf-price').value.trim() || '$0.00',
      old_price: document.getElementById('pf-oldprice').value.trim() || null,
      description: document.getElementById('pf-desc').value.trim(),
      image_url: imageUrl || null,
      owner_phone: currentUser.phone,
      owner_name: currentUser.name,
      likes: 0
    });

    // ... resto de tu lógica de limpiar y renderizar ...
    selectedFile = null;
    document.getElementById('image-preview').classList.add('hidden');
  } catch(e) {
    showToast('❌', 'Error al publicar');
  }
}

// ==================== BOTÓN WHATSAPP ====================
function createPostCard(store, p) {
  const card = document.createElement('div');
  card.className = 'post-card';

  const whatsappBtn = p.owner_phone ? 
    `<button class="btn-contact" style="background:#25D366;color:white;" onclick="openWhatsApp('${p.owner_phone}', '${p.name}')">
       📲 Contactar por WhatsApp
     </button>` : 
    `<button class="btn-contact" onclick="contactSeller('${store.name}','${p.name}')">Contactar vendedor</button>`;

  // ... resto de tu HTML de la tarjeta ...
  card.innerHTML = `
    ${imgBlock}
    <div class="post-body">
      ... 
      <div class="post-actions">
        ${whatsappBtn}
        <button class="btn-like" ... >♡ ${p.likes || 0}</button>
      </div>
    </div>
  `;
  return card;
}

function openWhatsApp(phone, productName) {
  const cleanPhone = phone.replace(/\s+/g, '').replace('+', '');
  const message = encodeURIComponent(`Hola, me interesa el producto: ${productName}`);
  window.open(`https://wa.me/${cleanPhone}?text=${message}`, '_blank');
}

// ==================== INICIO ====================
document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  init();        // tu función original
});
</script>
